<main>
  <div class="card">
    <p class="eyebrow">挑戦する問題数をえらぶ</p>
    <div class="modes">
      <button class="btn mode-btn" data-n="10"><span class="n">10</span><span class="u">問 / さくっと</span></button>
      <button class="btn mode-btn" data-n="30"><span class="n">30</span><span class="u">問 / じっくり</span></button>
      <button class="btn mode-btn" data-n="50"><span class="n">50</span><span class="u">問 / どっぷり</span></button>
      <button class="btn mode-btn primary" data-n="100"><span class="n">100</span><span class="u">問 / 宇宙級</span></button>
    </div>
    <p class="small" style="margin-top:10px">○×と4択が200問のプールからランダムに出題されます。1問正解ごとに100点。</p>
  </div>

  <div class="card">
    <p class="eyebrow">ランキングに載せるペンネーム</p>
    <input type="text" id="penname" maxlength="20" placeholder="ペンネーム(20文字まで)">
    <p class="small" style="margin-top:6px">登録もログインも不要です。ペンネームはこの端末の中にだけ保存され、スコア送信時にランキングへ記載されます。</p>
  </div>

  <div class="navrow">
    <a class="btn" href="ranking.html">ランキング</a>
    <a class="btn" href="submit.html">クイズを投稿</a>
    <a class="btn ghost" href="admin.html">管理</a>
  </div>
</main>

<script src="js/common.js"></script>
<script>
(() => {
  const input = document.getElementById("penname");
  const saved = getPenName();
  input.value = saved === "名無しの宇宙人" ? "" : saved;

  document.querySelectorAll(".mode-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      savePenName(input.value);
      location.href = "quiz.html?n=" + btn.dataset.n;
    });
  });
})();
</script>
