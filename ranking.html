<main>
  <div class="tabs" role="tablist">
    <button class="tab" data-mode="10">10問</button>
    <button class="tab" data-mode="30">30問</button>
    <button class="tab" data-mode="50">50問</button>
    <button class="tab" data-mode="100">100問</button>
  </div>

  <div class="card">
    <div id="listBox"><p class="small">読み込み中…</p></div>
  </div>

  <div class="navrow">
    <a class="btn primary" href="index.html">クイズに挑戦する</a>
  </div>
</main>

<script src="js/common.js"></script>
<script>
(async () => {
  const penName = getPenName();
  const quiz = await getQuiz();
  let mode = parseInt(new URLSearchParams(location.search).get("mode")) || 10;
  if (![10, 30, 50, 100].includes(mode)) mode = 10;

  async function load() {
    document.querySelectorAll(".tab").forEach(t =>
      t.classList.toggle("active", parseInt(t.dataset.mode) === mode));
    const box = document.getElementById("listBox");
    box.innerHTML = '<p class="small">読み込み中…</p>';

    const { data: rows, error } = await sb.from("ranking_view")
      .select("rank, nickname, score, correct_count")
      .eq("quiz_id", quiz.id).eq("total_questions", mode)
      .order("rank").limit(50);

    if (error) { box.innerHTML = '<p class="small">読み込みに失敗しました。</p>'; return; }
    if (!rows || rows.length === 0) {
      box.innerHTML = `<p class="center" style="margin:10px 0">まだ誰も挑戦していません。<br>最初の宇宙飛行士になりましょう!</p>`;
      return;
    }

    let html = '<table class="rank"><tr><th>順位</th><th>ペンネーム</th><th>スコア</th><th>正解</th></tr>';
    for (const r of rows) {
      const cls = [];
      if (r.rank <= 3) cls.push("rank-" + r.rank);
      if (r.nickname === penName) cls.push("me");
      html += `<tr class="${cls.join(" ")}"><td>${r.rank}位</td><td>${esc(r.nickname)}</td><td>${r.score}点</td><td>${r.correct_count}/${mode}</td></tr>`;
    }
    html += "</table>";

    // 圏外の場合は自分のペンネームの位置を下に表示
    if (!rows.some(r => r.nickname === penName)) {
      const { data: myRow } = await sb.from("ranking_view")
        .select("rank, score").eq("quiz_id", quiz.id)
        .eq("total_questions", mode).eq("nickname", penName).maybeSingle();
      if (myRow) html += `<p class="small" style="margin-top:10px">「${esc(penName)}」: ${myRow.rank}位(${myRow.score}点)</p>`;
    }
    box.innerHTML = html;
  }

  document.querySelectorAll(".tab").forEach(t =>
    t.addEventListener("click", () => { mode = parseInt(t.dataset.mode); load(); }));
  load();
})();
</script>
